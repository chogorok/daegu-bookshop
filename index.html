<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>대구 책방 여행기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* 초고록 크림 & 그린 팔레트 */
:root{
  --ink:#1a2e1a;
  --brown:#4e6840;
  --cream:#f8f5ec;
  --rust:#3a6640;
  --gold:#6a9a50;
  --pale:#eef3e6;
  --border:#c2d4ae;
  --header:#2a3d28;
  --header-accent:#4a7a3a;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--pale);color:var(--ink);min-height:100vh;}

/* ── 헤더 ── */
header{background:var(--header);color:var(--cream);text-align:center;padding:32px 20px 28px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(135deg,transparent,transparent 12px,rgba(255,255,255,.025) 12px,rgba(255,255,255,.025) 13px);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--header-accent),#8fc46a,var(--header-accent));}
.header-inner{position:relative;z-index:1;}
.header-tag{font-size:11px;letter-spacing:.22em;color:#8fc46a;text-transform:uppercase;margin-bottom:10px;font-weight:500;}
header h1{font-family:'Noto Serif KR',serif;font-size:clamp(22px,5vw,32px);font-weight:700;line-height:1.3;margin-bottom:8px;}
header p{font-size:13px;color:rgba(238,240,230,.65);letter-spacing:.04em;margin-bottom:20px;}
.header-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-header{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:11px 18px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;}
.btn-header.primary{background:var(--gold);color:#fff;}
.btn-header.ghost{background:rgba(255,255,255,.13);color:var(--cream);border:1px solid rgba(255,255,255,.2);}
.btn-header.ghost:hover{background:rgba(255,255,255,.22);}

/* ── 로딩 ── */
#loadingBar{background:var(--header);color:var(--cream);text-align:center;padding:12px;font-size:13px;}
.hidden{display:none!important;}

/* ══════════════════════════════
   STEP 1 — 책방 목록
══════════════════════════════ */
#viewList{padding-bottom:100px;}
.page-wrap{max-width:900px;margin:0 auto;padding:32px 20px;}
.section-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.section-sub{font-size:13px;color:var(--brown);margin-bottom:22px;}
/* 3열 그리드 (데스크톱) */
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

/* 책방 카드 */
.shop-card{background:#fff;border-radius:12px;padding:0;border:2px solid var(--border);transition:all .2s;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.shop-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09);}
.shop-card.selected{border-color:var(--rust);background:#f0f7ec;}
.shop-card.already-stamped{border-color:#b8cfaa;background:#f3f7ee;opacity:.75;cursor:default;}
.card-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;z-index:1;}
.shop-card.selected .card-check{background:var(--rust);border-color:var(--rust);color:#fff;}
.shop-card.already-stamped .card-check{background:var(--gold);border-color:var(--gold);color:#fff;}
.card-img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--pale);flex-shrink:0;}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.card-body{padding:14px 14px 14px 14px;flex:1;}
.shop-name{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;margin-bottom:4px;padding-right:28px;}
.shop-genre{font-size:11px;color:var(--gold);font-weight:600;margin-bottom:6px;display:inline-block;}
.shop-desc{font-size:12px;color:#4a5e3c;line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* 페이지 네비게이션 */
.page-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:18px;padding-bottom:4px;}
.page-nav-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--ink);flex-shrink:0;}
.page-nav-btn:hover:not(:disabled){border-color:var(--rust);color:var(--rust);}
.page-nav-btn:disabled{opacity:.3;cursor:default;}
.page-indicator{font-size:13px;color:var(--brown);min-width:60px;text-align:center;}

/* 하단 플로팅 버튼 */
.floating-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100;transform:translateY(100%);transition:transform .3s;}
.floating-bar.visible{transform:translateY(0);}
.floating-count{font-size:13px;color:var(--brown);}
.floating-count strong{color:var(--rust);font-size:16px;}
.btn-next{flex:1;max-width:240px;padding:13px;background:var(--rust);color:#fff;border:none;border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;}

/* ══════════════════════════════
   스탬프 카드 모달
══════════════════════════════ */
#recordModal{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);}
.record-box{position:relative;z-index:1;background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.3);}
.record-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.record-head h3{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#bbb;padding:0 4px;}

/* 스탬프 카드 */
#stampCard{background:var(--cream);padding:28px 20px;}
.stamp-card-title{text-align:center;margin-bottom:4px;}
.stamp-card-title h2{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;letter-spacing:.04em;}
.stamp-card-title p{font-size:11px;color:var(--brown);letter-spacing:.16em;margin-top:4px;}
.stamp-divider{border:none;border-top:1.5px solid var(--border);margin:16px 0;}
.stamp-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:4px;}

/* 📸 폴라로이드 사진 카드 */
.photo-stamp{
  background:#fff;
  border-radius:3px;
  padding:6px 6px 22px;
  box-shadow:0 2px 8px rgba(0,0,0,.13), 0 1px 2px rgba(0,0,0,.08);
  text-align:center;
  flex-shrink:0;
  transition:transform .2s;
}
.photo-stamp:hover{transform:rotate(-1deg) scale(1.03);}
.photo-stamp-name{
  font-family:'Noto Serif KR',serif;
  font-weight:700;
  color:var(--ink);
  margin-top:7px;
  line-height:1.3;
  word-break:keep-all;
}
.photo-stamp-date{color:var(--brown);margin-top:2px;}

.visited-section-title{font-size:12px;font-weight:700;color:var(--brown);letter-spacing:.1em;margin-bottom:10px;}
.visited-list{display:flex;flex-direction:column;gap:8px;}
.visited-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid var(--border);}
.visited-num{width:24px;height:24px;border-radius:50%;background:var(--rust);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.visited-name{font-size:14px;font-weight:700;color:var(--ink);}
.visited-meta{font-size:11px;color:var(--brown);margin-top:2px;}
.synchro-tag{background:#e6f2de;color:var(--rust);font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-left:6px;}
.empty-record{text-align:center;padding:40px 20px;color:var(--brown);}
.empty-record span{display:block;font-size:40px;margin-bottom:12px;}

.record-actions{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;}
.btn-download{flex:1;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;}
.btn-close-rec{flex:1;padding:12px;background:none;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:var(--brown);}

/* 검색 */
.search-wrap{position:relative;margin-bottom:20px;}
.search-input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;background:#fff;color:var(--ink);outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--rust);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.search-empty{text-align:center;padding:40px 0;color:var(--brown);font-size:14px;grid-column:1/-1;}

/* 인스타 버튼 */
.btn-insta{flex:1;padding:12px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border:none;border-radius:9px;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;}

/* 토스트 */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);padding:12px 24px;border-radius:24px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Galaxy S23 (≤480px) 모바일 최적화 ── */
@media(max-width:480px){
  /* 헤더 슬림 */
  header{padding:20px 0 18px;}
  .header-tag{font-size:10px;margin-bottom:6px;}
  header h1{font-size:22px;margin-bottom:4px;}
  header p{font-size:12px;margin-bottom:12px;}
  .btn-header{padding:8px 14px;font-size:12px;}

  /* 섹션 헤더 슬림 */
  .section-title{font-size:16px;margin-bottom:4px;}
  .section-sub{font-size:11px;margin-bottom:14px;}
  .search-wrap{margin-bottom:14px;}
  .search-input{padding:10px 14px 10px 38px;font-size:13px;}

  /* 카드 목록 */
  .shop-grid{grid-template-columns:1fr;gap:9px;}
  .shop-card{border-radius:10px;}
  .card-body{padding:12px 14px;}
  .shop-name{font-size:13px;padding-right:22px;margin-bottom:3px;}
  .shop-genre{font-size:10px;margin-bottom:4px;}
  .shop-desc{font-size:11px;-webkit-line-clamp:2;}
  .card-check{top:8px;right:8px;width:20px;height:20px;font-size:11px;}

  /* 페이지 네비 */
  .page-nav{margin-top:12px;gap:12px;}
  .page-nav-btn{width:36px;height:36px;font-size:16px;}
  .page-indicator{font-size:12px;}

  .synchro-num{font-size:30px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">Daegu · Bookshop Tour</div>
    <h1>대구 책방<br>여행기</h1>
    <p>한 권의 책이 주는 여행의 여운</p>
    <div class="header-btns">
      <button class="btn-header ghost" onclick="showRecord()">🎫 나의 책방 여행 기록</button>
    </div>
  </div>
</header>

<div id="loadingBar" class="hidden"><div id="loadingMsg">책방 정보를 불러오는 중...</div></div>

<!-- ① 책방 목록 -->
<div id="viewList">
  <div class="page-wrap">
    <div class="section-title">📚 대구의 소중한 책방들</div>
    <div class="section-sub">다녀온 책방을 선택하면 스탬프를 만들어 드려요.</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="책방 이름 검색..." oninput="filterShops(this.value)">
    </div>
    <div class="shop-grid" id="shopGrid"></div>
    <div class="page-nav" id="pageNav">
      <button class="page-nav-btn" id="btnPrev" onclick="changePage(-1)" disabled>&#8592;</button>
      <span class="page-indicator" id="pageIndicator"></span>
      <button class="page-nav-btn" id="btnNext" onclick="changePage(1)" disabled>&#8594;</button>
    </div>
  </div>
  <div class="floating-bar" id="floatingBar">
    <div class="floating-count"><strong id="selCount">0</strong>곳 선택됨</div>
    <button class="btn-next" onclick="quickStamp()">🎫 스탬프 받기</button>
  </div>
</div>

<!-- 스탬프 기록 모달 -->
<div id="recordModal" class="hidden">
  <div class="modal-overlay" onclick="closeRecord()"></div>
  <div class="record-box">
    <div class="record-head">
      <h3>🎫 나의 대구 책방 여행 기록</h3>
      <button class="modal-close" onclick="closeRecord()">×</button>
    </div>
    <div id="stampCard">
      <div class="stamp-card-title">
        <h2>대구 책방 여행기</h2>
        <p>DAEGU BOOKSHOP TOUR · 대구 중구</p>
      </div>
      <hr class="stamp-divider">
      <div class="stamp-grid" id="stampGrid"></div>
    </div>
    <div class="record-actions">
      <button class="btn-download" onclick="downloadCard()">⬇ 이미지 저장</button>
      <button class="btn-close-rec" onclick="closeRecord()">닫기</button>
    </div>
    <div style="text-align:center;padding:0 20px 16px;">
      <button onclick="resetStamps()" style="background:none;border:none;font-size:12px;color:#ccc;cursor:pointer;text-decoration:underline;">스탬프 전체 초기화</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SHEET_ID = '1k9hT9kfffJw3_H3Whd_eN71TBT-iP81dhuXYVe0DoZA';
const SHEET_NAME = '대구 책방 여행';
// 시트 열: A=책방이름, B=책방소개, C=장르(선택), D=간판사진URL

let shops = [];
let selectedIds = new Set();   // 방문 선택한 책방
let uploadedPhotos = {};       // shopId → dataUrl
let currentPage = 0;
let searchQuery = '';
const PAGE_SIZE = 3;

// ── 유틸 ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stableId(name){let h=0;for(const c of name)h=(Math.imul(31,h)+c.charCodeAt(0))|0;return'shop_'+Math.abs(h).toString(36);}
function normalizeImgUrl(url){
  if(!url)return'';
  const m=url.match(/drive\.google\.com\/file\/d\/([^/?]+)/);
  if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  const m2=url.match(/[?&]id=([^&]+)/);
  if(m2&&url.includes('drive.google.com'))return`https://drive.google.com/thumbnail?id=${m2[1]}&sz=w800`;
  return url;
}

// ── 구글 시트 ──
function fetchShops(){
  return new Promise((resolve,reject)=>{
    const cb='gsCb_'+Date.now();
    const s=document.createElement('script');
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(SHEET_NAME)}`;
    window[cb]=(data)=>{
      delete window[cb];s.remove();
      try{
        const rows=data.table.rows;
        resolve(rows.filter(r=>r.c?.[0]?.v).map(r=>({
          id:stableId(r.c[0].v),
          name:r.c[0]?.v||'',
          desc:r.c[1]?.v||'',
          genre:r.c[2]?.v||'',
          signUrl:normalizeImgUrl(r.c[3]?.v||''),
        })));
      }catch(e){reject(e);}
    };
    s.onerror=()=>{delete window[cb];s.remove();reject(new Error('시트 로드 실패'));};
    s.src=url;document.head.appendChild(s);
  });
}

// ── 스탬프 저장 ──
function getStamps(){try{return JSON.parse(localStorage.getItem('daegu_stamps')||'{}');}catch{return{};}}
function saveStamps(obj){localStorage.setItem('daegu_stamps',JSON.stringify(obj));}
function isStamped(id){return!!getStamps()[id];}

// ── 싱크로율 계산 (재미용, 항상 스탬프 발급) ──
async function calcSynchro(refUrl, userDataUrl){
  if(!refUrl) return 80 + Math.floor(Math.random()*20); // 기준 사진 없으면 80~99
  try{
    const loadImg=(src)=>new Promise((res,rej)=>{
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>res(img);img.onerror=rej;img.src=src;
    });
    const [a,b]=await Promise.all([loadImg(refUrl),loadImg(userDataUrl)]);
    const SIZE=32;
    const toPixels=(img)=>{
      const c=document.createElement('canvas');c.width=SIZE;c.height=SIZE;
      c.getContext('2d').drawImage(img,0,0,SIZE,SIZE);
      return c.getContext('2d').getImageData(0,0,SIZE,SIZE).data;
    };
    const pA=toPixels(a),pB=toPixels(b);
    let diff=0;
    for(let i=0;i<pA.length;i+=4) diff+=Math.abs(pA[i]-pB[i])+Math.abs(pA[i+1]-pB[i+1])+Math.abs(pA[i+2]-pB[i+2]);
    const raw=1-diff/(255*3*SIZE*SIZE);
    // 재미있는 범위로 보정 (60~99%)
    return Math.min(99, Math.round(60 + raw * 39));
  }catch{
    return 75 + Math.floor(Math.random()*20);
  }
}

// ══════════════════
// STEP 1 — 목록
// ══════════════════
function goList(){
  document.getElementById('viewList').classList.remove('hidden');
  document.getElementById('viewRegister').classList.add('hidden');
  document.getElementById('viewResult').classList.add('hidden');
}

function getFilteredShops(){
  const q=searchQuery.trim().toLowerCase();
  return q ? shops.filter(s=>s.name.toLowerCase().includes(q)) : shops;
}

function renderShops(){
  const grid=document.getElementById('shopGrid');
  const stamps=getStamps();
  if(!shops.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--brown);">
      <div style="font-size:44px;margin-bottom:14px;">📚</div>
      책방 정보를 불러오는 중이에요.
    </div>`;
    updatePageNav(0,0);return;
  }
  const filtered=getFilteredShops();
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  currentPage=Math.max(0,Math.min(currentPage,totalPages-1));
  const pageShops=filtered.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);

  grid.innerHTML='';
  if(!filtered.length){
    const d=document.createElement('div');
    d.className='search-empty';d.style.gridColumn='1/-1';
    d.textContent=`"${searchQuery}" 검색 결과가 없어요`;
    grid.appendChild(d);
    updatePageNav(0,0);return;
  }

  pageShops.forEach(shop=>{
    const stamped=isStamped(shop.id);
    const sel=selectedIds.has(shop.id);
    const card=document.createElement('div');
    card.className='shop-card'+(sel?' selected':'')+(stamped?' already-stamped':'');
    card.onclick=()=>{ if(stamped)return; toggleSelect(shop.id); };
    card.innerHTML=`
      <div class="card-check">${stamped||sel?'✓':''}</div>
      <div class="card-body">
        <div class="shop-name">${esc(shop.name)}</div>
        ${shop.genre?`<span class="shop-genre">${esc(shop.genre)}</span>`:''}
        ${shop.desc?`<p class="shop-desc">${esc(shop.desc)}</p>`:''}
        ${stamped?`<div style="font-size:11px;color:#3a6640;margin-top:8px;font-weight:600;">✓ 이미 스탬프 완료</div>`:''}
      </div>`;
    grid.appendChild(card);
  });
  updatePageNav(currentPage,totalPages);
}

function updatePageNav(page,total){
  const prev=document.getElementById('btnPrev');
  const next=document.getElementById('btnNext');
  const ind=document.getElementById('pageIndicator');
  if(total<=1){
    document.getElementById('pageNav').style.display='none';return;
  }
  document.getElementById('pageNav').style.display='';
  prev.disabled=page<=0;
  next.disabled=page>=total-1;
  ind.textContent=`${page+1} / ${total}`;
}

function changePage(dir){
  currentPage+=dir;
  renderShops();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleSelect(shopId){
  if(selectedIds.has(shopId)) selectedIds.delete(shopId);
  else selectedIds.add(shopId);
  renderShops();
  updateFloating();
}

function updateFloating(){
  const bar=document.getElementById('floatingBar');
  document.getElementById('selCount').textContent=selectedIds.size;
  if(selectedIds.size>0) bar.classList.add('visible');
  else bar.classList.remove('visible');
}

// ══════════════════
// 스탬프 찍기 (선택 → 바로 등록)
// ══════════════════
function quickStamp(){
  if(!selectedIds.size) return;
  const names = shops.filter(s=>selectedIds.has(s.id)).map(s=>s.name).join(', ');
  if(!confirm(`선택한 ${selectedIds.size}곳에 스탬프를 찍을까요?\n\n${names}`)) return;

  const stamps = getStamps();
  const today  = new Date().toLocaleDateString('ko-KR');
  selectedIds.forEach(id => { stamps[id] = {date: today}; });
  saveStamps(stamps);

  selectedIds.clear();
  showRecord();
  renderShops();
  updateFloating();
}

// ══════════════════
// 스탬프 기록 모달
// ══════════════════
function showRecord(){
  renderStampCard();
  document.getElementById('recordModal').classList.remove('hidden');
}
function closeRecord(){document.getElementById('recordModal').classList.add('hidden');}

function photoSizeFor(count){
  if(count<=2) return {box:160, nameFont:12, dateFont:10};
  if(count<=4) return {box:130, nameFont:11, dateFont:9};
  if(count<=6) return {box:108, nameFont:10, dateFont:9};
  if(count<=9) return {box:88,  nameFont:9,  dateFont:8};
  return               {box:72,  nameFont:8,  dateFont:7};
}

function renderStampCard(){
  const stamps=getStamps();
  const visited=shops.filter(s=>stamps[s.id]);
  const sz=photoSizeFor(visited.length);

  // 📸 폴라로이드 사진 카드
  document.getElementById('stampGrid').innerHTML= visited.length
    ? visited.map(s=>{
        const st=stamps[s.id];
        const imgSrc = s.signUrl || '';
        const imgHtml = imgSrc
          ? `<img src="${esc(imgSrc)}" style="width:100%;aspect-ratio:1/1;object-fit:cover;display:block;border-radius:2px;">`
          : `<div style="width:100%;aspect-ratio:1/1;background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:28px;border-radius:2px;">📚</div>`;
        return`<div class="photo-stamp" style="width:${sz.box}px;">
          ${imgHtml}
          <div class="photo-stamp-name" style="font-size:${sz.nameFont}px;">${esc(s.name)}</div>
        </div>`;
      }).join('')
    : `<div style="text-align:center;width:100%;padding:24px 0;color:#aaa;font-size:13px;">아직 방문한 책방이 없어요</div>`;

}

function resetStamps(){
  if(!confirm('스탬프를 전부 초기화할까요?'))return;
  localStorage.removeItem('daegu_stamps');
  closeRecord();
  renderShops();
  showToast('스탬프가 초기화됐어요');
}

function filterShops(q){
  searchQuery=q;
  currentPage=0;
  renderShops();
}

async function downloadCard(){
  try{
    showToast('이미지를 준비 중이에요...');

    const stamps  = getStamps();
    const visited = shops.filter(s => stamps[s.id]);
    if(!visited.length){ showToast('방문한 책방이 없어요'); return; }

    const CARD_W = 390, PAD = 24, GAP = 8;
    const n    = visited.length;
    const cols = n <= 2 ? n : n <= 4 ? 2 : n <= 9 ? 3 : 4;
    const photoW = Math.floor((CARD_W - PAD*2 - GAP*(cols-1)) / cols);
    const nf     = Math.max(8, Math.min(13, Math.floor(photoW / 9)));

    // ── 캡처용 DOM ──
    const wrap = document.createElement('div');
    wrap.style.cssText =
      `position:fixed;left:-9999px;top:0;width:${CARD_W}px;` +
      `background:#f8f5ec;padding:${PAD}px;font-family:'Noto Serif KR',serif;box-sizing:border-box;`;
    wrap.innerHTML = `
      <div style="text-align:center;margin-bottom:14px;">
        <div style="font-size:18px;font-weight:700;letter-spacing:.04em;color:#1a2e1a;">대구 책방 여행기</div>
        <div style="font-size:10px;color:#4e6840;letter-spacing:.18em;margin-top:4px;font-family:'Noto Sans KR',sans-serif;">DAEGU BOOKSHOP TOUR</div>
      </div>
      <hr style="border:none;border-top:1.5px solid #c2d4ae;margin:0 0 14px;">
      <div id="_captureGrid" style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:${GAP}px;"></div>
      <div style="text-align:center;margin-top:16px;font-family:'Noto Serif KR',serif;font-size:13px;color:#4e6840;letter-spacing:.08em;">대구 책방을 기록하다.</div>`;
    document.body.appendChild(wrap);

    const grid = wrap.querySelector('#_captureGrid');
    visited.forEach(s => {
      const card = document.createElement('div');
      card.style.cssText =
        'background:#fff;border-radius:3px;padding:5px 5px 14px;' +
        'box-shadow:0 2px 6px rgba(0,0,0,.13);text-align:center;';

      // 이미지 영역: crossOrigin='anonymous' → CORS 성공 시 캡처 가능
      const imgWrap = document.createElement('div');
      imgWrap.style.cssText =
        `width:100%;aspect-ratio:1/1;border-radius:2px;overflow:hidden;` +
        `background:#eef3e6;display:flex;align-items:center;justify-content:center;font-size:${Math.floor(photoW*.28)}px;`;
      imgWrap.textContent = '📚'; // 기본 플레이스홀더

      if(s.signUrl){
        const img = document.createElement('img');
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onload  = ()=>{ imgWrap.innerHTML=''; imgWrap.appendChild(img); };
        img.onerror = ()=>{};
        img.src = s.signUrl;
        if(img.complete && img.naturalWidth){ imgWrap.innerHTML=''; imgWrap.appendChild(img); }
      }

      const nameDiv = document.createElement('div');
      nameDiv.style.cssText =
        `font-size:${nf}px;font-weight:700;color:#1a2e1a;` +
        `margin-top:6px;line-height:1.3;word-break:keep-all;font-family:'Noto Serif KR',serif;`;
      nameDiv.textContent = s.name;

      card.appendChild(imgWrap);
      card.appendChild(nameDiv);
      grid.appendChild(card);
    });

    // 이미지 로드 완료(또는 실패) 대기 — 최대 8초
    await Promise.race([
      Promise.all([...wrap.querySelectorAll('img')].map(img =>
        img.complete ? Promise.resolve() :
        new Promise(r => { img.onload = r; img.onerror = r; })
      )),
      new Promise(r => setTimeout(r, 8000))
    ]);

    const canvas = await html2canvas(wrap, {
      backgroundColor: '#f8f5ec',
      scale: 2,
      allowTaint: true,
      width: CARD_W,
      logging: false,
    });
    document.body.removeChild(wrap);

    let dataUrl;
    try{ dataUrl = canvas.toDataURL('image/png'); }
    catch(e){
      // canvas 오염 시 → 사진 없이 다시 캡처
      showToast('사진 캡처 제한으로 이름만 표시돼요');
      return;
    }

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS){
      const win = window.open();
      win.document.write(
        `<img src="${dataUrl}" style="max-width:100%;display:block;margin:0 auto">` +
        `<p style="font-family:sans-serif;color:#888;font-size:13px;text-align:center;padding:12px">이미지를 꾹 눌러 저장해주세요 📥</p>`
      );
    } else {
      const a = document.createElement('a');
      a.download = '대구책방여행기록.png';
      a.href = dataUrl;
      a.click();
    }
  }catch(e){ console.error(e); showToast('이미지 저장에 실패했어요.'); }
}

// ── 토스트 ──
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── 초기화 ──
async function init(){
  const bar=document.getElementById('loadingBar');
  try{
    bar.classList.remove('hidden');
    shops=await fetchShops();
    bar.classList.add('hidden');
    renderShops();
  }catch(e){
    bar.classList.add('hidden');
    showToast('⚠️ 시트를 불러오지 못했어요. "링크로 공유" 여부를 확인해주세요.');
    renderShops();
  }
}
init();
</script>
